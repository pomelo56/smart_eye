name: smart_eye
description: "AI视障寻物助手 - 通过摄像头识别物品并用语音播报"
publish_to: 'none'

version: 0.9.0-rc2+22

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # CVE-STYLE-017: 锁定依赖版本，防止意外升级引入安全漏洞或兼容性问题
  # Camera support for real-time preview and image capture
  camera: 0.11.0+2
  # On-device OCR text recognition (privacy-first, no cloud)
  google_mlkit_text_recognition: 0.14.0
  # Shared preferences for first-launch tutorial flag
  shared_preferences: 2.5.3
  # File logger: persistent diagnostics and export
  path_provider: 2.1.5
  # HTTP client and download progress for in-app update
  dio: 5.10.0
  # Read local package version for update comparison
  package_info_plus: 8.3.1
  # Detect Wi-Fi connectivity before checking for updates
  connectivity_plus: 6.1.5

flutter:
  uses-material-design: true

  assets:
    - assets/audio/

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 4.0.0
  test: 1.25.7
