name: smart_eye
description: "A new Flutter project."
publish_to: 'none'

version: 0.5.0+5

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Camera support for real-time preview and image capture
  camera: ^0.11.0
  # On-device OCR text recognition (privacy-first, no cloud)
  google_mlkit_text_recognition: ^0.14.0
  # Shared preferences for first-launch tutorial flag
  shared_preferences: ^2.3.2
  # File logger: persistent diagnostics and export
  path_provider: ^2.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  test: ^1.25.7
