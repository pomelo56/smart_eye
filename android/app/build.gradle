plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.smart_eye"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.smart_eye"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 24 // Android 7.0, required for camera and ML Kit
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Restrict native ABIs to arm64-v8a only to reduce APK size by ~50%.
        // Modern devices (since 2019) all use arm64; armv7 is dropped.
        // If you need to support armv7 devices, remove this block and
        // pass --target-platform=android-arm,android-arm64 to flutter build.
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    // Split per-ABI so the universal APK stays small.
    // The ndk.abiFilters above already restricts which ABIs are compiled;
    // splits is left in its default state (disabled). Use
    // 'flutter build apk --split-per-abi' to additionally generate per-ABI APKs.
    splits {
        abi {
            enable false
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Chinese text recognition model for ML Kit (required for platform detection)
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'
}
