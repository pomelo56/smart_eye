plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// 加载签名配置 - CVE-STYLE-002
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.smart_eye"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // CVE-STYLE-015: 使用正式包名 com.smart_eye 替换默认的 com.example.smart_eye
        applicationId = "com.smart_eye"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 24 // Android 7.0, required for camera and ML Kit
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Restrict native ABIs to arm64-v8a only to reduce APK size by ~50%.
        // Modern devices (since 2019) all use arm64; armv7 is dropped.
        // If you need to support armv7 devices, remove this block and
        // pass --target-platform=android-arm,android-arm64 to flutter build.
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    // Split per-ABI so the universal APK stays small.
    // The ndk.abiFilters above already restricts which ABIs are compiled;
    // splits is left in its default state (disabled). Use
    // 'flutter build apk --split-per-abi' to additionally generate per-ABI APKs.
    splits {
        abi {
            enable false
        }
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            // CVE-STYLE-002: 使用正式签名密钥，如果key.properties不存在则fallback到debug（开发环境）
            signingConfig = keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug

            // R8 code shrinking + resource shrinking (enabled in v0.7.0).
            // - minifyEnabled: removes unused Java/Kotlin code (saves 5-10 MB)
            // - shrinkResources: removes unused drawable/layout/string resources
            // - proguardFiles: ML Kit keep rules in proguard-rules.pro must be
            //   kept up-to-date; see test/unit/build/build_config_test.dart.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Chinese text recognition model for ML Kit (required for platform detection)
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'

    // AndroidX core for ContextCompat / ActivityCompat (used by the
    // v0.7.1 camera permission flow in MainActivity.kt).
    implementation 'androidx.core:core-ktx:1.13.1'
}
